<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pi-workflows</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --line: #30363d;
      --good: #3fb950;
      --bad: #f85149;
      --accent: #58a6ff;
      --warn: #d29922;
      --running: #a371f7;
      --node-size: 32px;
      --connector-color: #30363d;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 24px;
    }
    .page { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .title { font-size: 22px; color: #fff; font-weight: 700; }
    .meta { color: var(--muted); font-size: 13px; margin-left: auto; }

    .runs-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      min-height: calc(100vh - 100px);
    }

    .sidebar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow-y: auto;
      max-height: calc(100vh - 100px);
    }
    .sidebar-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      position: sticky;
      top: 0;
      background: var(--panel);
    }
    .run-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.1s;
    }
    .run-item:last-child { border-bottom: none; }
    .run-item:hover { background: #1c2128; }
    .run-item.active { background: #1c2128; border-left: 3px solid var(--accent); }
    .run-item-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .run-item-meta { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }

    .main-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 24px;
      overflow-y: auto;
      max-height: calc(100vh - 100px);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 14px;
      flex-direction: column;
      gap: 8px;
    }
    .empty-state-icon { font-size: 32px; opacity: 0.5; }

    .run-detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }
    .run-detail-title { font-size: 18px; font-weight: 700; color: #fff; }
    .run-detail-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .run-detail-time {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .time-sequential {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .time-arrow {
      color: var(--good);
      font-size: 14px;
    }
    .time-actual {
      color: var(--good);
      font-weight: 600;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.running { color: var(--running); background: rgba(163,113,247,0.15); }
    .badge.completed { color: var(--good); background: rgba(63,185,80,0.15); }
    .badge.failed { color: var(--bad); background: rgba(248,81,73,0.15); }
    .badge.cancelled { color: var(--warn); background: rgba(210,153,34,0.15); }
    .badge.pending { color: var(--muted); background: rgba(139,148,158,0.15); }

    .workflow-tree {
      position: relative;
      padding-left: 20px;
    }

    .phase-group {
      margin-bottom: 8px;
    }
    .phase-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
      padding-left: 44px;
    }

    .tree-node {
      position: relative;
    }

    .tree-node-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 6px 0;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .tree-node-header:hover {
      background: rgba(88, 166, 255, 0.05);
    }

    .node-connector {
      position: relative;
      width: var(--node-size);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .node-dot {
      width: var(--node-size);
      height: var(--node-size);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      position: relative;
      z-index: 2;
      border: 2px solid;
    }
    .node-dot.running {
      border-color: var(--running);
      background: rgba(163,113,247,0.15);
      animation: pulse 2s ease-in-out infinite;
    }
    .node-dot.completed {
      border-color: var(--good);
      background: rgba(63,185,80,0.15);
    }
    .node-dot.failed {
      border-color: var(--bad);
      background: rgba(248,81,73,0.15);
    }
    .node-dot.pending {
      border-color: var(--line);
      background: rgba(139,148,158,0.08);
    }
    .node-dot.cancelled {
      border-color: var(--warn);
      background: rgba(210,153,34,0.1);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(163,113,247,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(163,113,247,0); }
    }

    .tree-line {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      background: var(--connector-color);
      z-index: 1;
    }
    .tree-line.top {
      top: 0;
      height: calc(50% - var(--node-size) / 2 + 6px);
    }
    .tree-line.bottom {
      bottom: 0;
      height: calc(50% - var(--node-size) / 2 + 6px);
    }
    .tree-line.active { background: var(--good); }
    .tree-line.running-line { background: var(--running); }

    .node-content {
      flex: 1;
      padding-top: 4px;
      min-width: 0;
    }
    .node-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .node-duration {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .node-error {
      font-size: 11px;
      color: var(--bad);
      margin-top: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .node-expand {
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    .node-details {
      display: none;
      margin-left: 44px;
      margin-bottom: 8px;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 12px;
    }
    .node-details.expanded {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .detail-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text);
    }

    .session-panel {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .session-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .session-tab {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.1s;
    }
    .session-tab:hover {
      background: rgba(88, 166, 255, 0.1);
      color: var(--text);
    }
    .session-tab.active {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      font-weight: 600;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }
    .summary-card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .summary-card-value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .summary-card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .model-table, .tool-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .model-table th, .tool-table th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .model-table td, .tool-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .model-table tr:last-child td, .tool-table tr:last-child td {
      border-bottom: none;
    }

    .message-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 500px;
      overflow-y: auto;
    }
    .message-item {
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 12px;
    }
    .message-role {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .message-role.user { color: var(--accent); }
    .message-role.assistant { color: var(--good); }
    .message-role.tool { color: var(--warn); }
    .message-content {
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      max-height: 100px;
      overflow: hidden;
    }
    .message-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      display: flex;
      gap: 12px;
    }

    .run-result {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .run-result-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .run-result-content {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .loading {
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
    }

    @media (max-width: 768px) {
      .runs-grid {
        grid-template-columns: 1fr;
      }
      .sidebar { max-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1 class="title">pi-workflows</h1>
      <span class="meta" id="meta">connecting...</span>
    </div>
    <div class="runs-grid">
      <div class="sidebar">
        <div class="sidebar-header">Runs</div>
        <div id="run-list"></div>
      </div>
      <div class="main-panel" id="main-panel">
        <div class="empty-state">
          <div class="empty-state-icon">&#9671;</div>
          <div>Select a run to view its workflow tree</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let runs = [];
    let selectedRunId = null;
    let sessionData = null;
    let activeSessionTab = 'overview';

    init();

    function init() {
      fetchRuns();
      startSSE();
    }

    function startSSE() {
      const es = new EventSource('/events');
      es.addEventListener('runs-updated', () => fetchRuns());
      es.addEventListener('connected', () => setMeta('live'));
      es.onerror = () => {
        setMeta('reconnecting...');
        es.close();
        setTimeout(startSSE, 2000);
      };
    }

    function fetchRuns() {
      fetch('/api/runs', { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
          runs = data;
          if (!selectedRunId && runs.length > 0) selectedRunId = runs[0].runId;
          render();
          setMeta('live');
        })
        .catch(() => setMeta('error'));
    }

    function fetchSession(runId) {
      sessionData = null;
      activeSessionTab = 'overview';
      fetch(`/api/runs/${runId}/session`, { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
          if (data && data.id) {
            sessionData = data;
            renderMainPanel();
          }
        })
        .catch(() => {});
    }

    function render() {
      renderSidebar();
      renderMainPanel();
    }

    function renderSidebar() {
      const list = document.getElementById('run-list');
      if (runs.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No runs yet</div>';
        return;
      }
      list.innerHTML = runs.map(run => {
        const active = run.runId === selectedRunId;
        const time = relativeTime(run.updatedAt);
        const stepCount = run.steps.length;
        const completedSteps = run.steps.filter(s => s.status === 'completed').length;
        return '<div class="run-item' + (active ? ' active' : '') + '" data-id="' + esc(run.runId) + '">'
          + '<div class="run-item-name">' + esc(run.workflow) + '</div>'
          + '<div class="run-item-meta">'
          + '<span class="badge ' + run.status + '">' + esc(run.status) + '</span>'
          + '<span>' + completedSteps + '/' + stepCount + ' steps</span>'
          + '<span>' + esc(time) + '</span>'
          + '</div></div>';
      }).join('');

      list.querySelectorAll('.run-item').forEach(item => {
        item.addEventListener('click', () => {
          selectedRunId = item.dataset.id;
          fetchSession(selectedRunId);
          render();
        });
      });
    }

    function renderMainPanel() {
      const panel = document.getElementById('main-panel');
      const run = runs.find(r => r.runId === selectedRunId);
      if (!run) {
        panel.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9671;</div><div>Select a run to view its workflow tree</div></div>';
        return;
      }

      let html = '';
      html += renderRunHeader(run);
      html += renderWorkflowTree(run);
      if (run.result) html += renderResult(run.result);
      html += renderSessionPanel(run);
      panel.innerHTML = html;
      attachNodeClickHandlers();
    }

    function renderRunHeader(run) {
      const duration = totalDuration(run);
      const seqDuration = sequentialDuration(run);
      let timeHtml = '';
      if (duration) {
        if (seqDuration && seqDuration !== duration) {
          timeHtml = '<span class="run-detail-time">'
            + '<span class="time-sequential">' + seqDuration + '</span>'
            + '<span class="time-arrow">→</span>'
            + '<span class="time-actual">' + duration + '</span>'
            + '</span>';
        } else {
          timeHtml = '<span class="run-detail-time"><span class="time-actual">' + duration + '</span></span>';
        }
      }
      return '<div class="run-detail-header">'
        + '<span class="badge ' + run.status + '">' + esc(run.status) + '</span>'
        + '<span class="run-detail-title">' + esc(run.workflow) + '</span>'
        + '<span class="run-detail-id">' + esc(run.runId.slice(0, 8)) + '</span>'
        + timeHtml
        + '</div>';
    }

    function renderWorkflowTree(run) {
      if (run.steps.length === 0) {
        return '<div class="empty-state" style="padding:40px 0"><div>No steps recorded yet</div></div>';
      }

      const phases = groupByPhase(run.steps);
      let html = '<div class="workflow-tree">';

      let globalIdx = 0;
      const totalSteps = run.steps.length;

      for (const phase of phases) {
        if (phase.name) {
          html += '<div class="phase-group"><div class="phase-label">' + esc(phase.name) + '</div>';
        } else {
          html += '<div class="phase-group">';
        }

        for (let i = 0; i < phase.steps.length; i++) {
          const step = phase.steps[i];
          const isFirst = globalIdx === 0;
          const isLast = globalIdx === totalSteps - 1;
          html += renderTreeNode(step, isFirst, isLast, globalIdx);
          globalIdx++;
        }

        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function renderTreeNode(step, isFirst, isLast, index) {
      const icon = nodeIcon(step.status);
      const dur = step.startedAt && step.completedAt
        ? ((step.completedAt - step.startedAt) / 1000).toFixed(1) + 's'
        : step.status === 'running' ? 'running...' : '';

      const topLineClass = !isFirst ? (' ' + lineClass(step.status)) : '';
      const bottomLineClass = !isLast ? (' ' + lineClassForNext(step.status)) : '';

      const tokens = step.tokens ? (step.tokens.input + step.tokens.output + step.tokens.cacheWrite) : 0;
      const tokenStr = tokens > 0 ? formatTokens(tokens) : '';
      const costStr = step.cost && step.cost.total > 0 ? formatCost(step.cost.total) : '';
      const modelStr = step.modelId ? (step.modelId.split('.').pop() || step.modelId) : '';
      const turnStr = step.turnCount ? '⟳' + step.turnCount : '';
      const toolStr = step.toolUses ? step.toolUses + ' tools' : '';

      const metaParts = [];
      if (turnStr) metaParts.push('<span>' + turnStr + '</span>');
      if (toolStr) metaParts.push('<span>' + toolStr + '</span>');
      if (tokenStr) metaParts.push('<span>' + tokenStr + '</span>');
      if (costStr) metaParts.push('<span>' + costStr + '</span>');
      if (modelStr) metaParts.push('<span>' + esc(modelStr) + '</span>');
      if (dur) metaParts.push('<span class="node-duration">' + dur + '</span>');

      let html = '<div class="tree-node">';
      html += '<div class="tree-node-header" data-step-index="' + index + '">';
      html += '<div class="node-connector">';
      if (!isFirst) html += '<div class="tree-line top' + topLineClass + '"></div>';
      if (!isLast) html += '<div class="tree-line bottom' + bottomLineClass + '"></div>';
      html += '<div class="node-dot ' + step.status + '">' + icon + '</div>';
      html += '</div>';
      html += '<div class="node-content">';
      html += '<div class="node-name">' + esc(step.name) + '</div>';
      html += '<div class="node-meta">' + metaParts.join('') + '</div>';
      if (step.error) html += '<div class="node-error">' + esc(step.error) + '</div>';
      html += '</div>';
      html += '<div class="node-expand">click to expand</div>';
      html += '</div>';
      html += '</div>';

      html += '<div class="node-details" id="node-details-' + index + '">';
      html += renderNodeDetails(step);
      html += '</div>';

      return html;
    }

    function renderNodeDetails(step) {
      let html = '<div class="detail-grid">';

      if (step.turnCount != null) {
        html += '<div class="detail-item"><span class="detail-label">Turns</span><span class="detail-value">' + step.turnCount + '</span></div>';
      }
      if (step.toolUses != null) {
        html += '<div class="detail-item"><span class="detail-label">Tool Uses</span><span class="detail-value">' + step.toolUses + '</span></div>';
      }
      if (step.tokens) {
        html += '<div class="detail-item"><span class="detail-label">Input Tokens</span><span class="detail-value">' + step.tokens.input.toLocaleString() + '</span></div>';
        html += '<div class="detail-item"><span class="detail-label">Output Tokens</span><span class="detail-value">' + step.tokens.output.toLocaleString() + '</span></div>';
        html += '<div class="detail-item"><span class="detail-label">Cache Write</span><span class="detail-value">' + step.tokens.cacheWrite.toLocaleString() + '</span></div>';
        const total = step.tokens.input + step.tokens.output + step.tokens.cacheWrite;
        html += '<div class="detail-item"><span class="detail-label">Total Tokens</span><span class="detail-value">' + total.toLocaleString() + '</span></div>';
      }
      if (step.cost) {
        html += '<div class="detail-item"><span class="detail-label">Cost</span><span class="detail-value">$' + step.cost.total.toFixed(4) + '</span></div>';
      }
      if (step.modelId) {
        html += '<div class="detail-item"><span class="detail-label">Model</span><span class="detail-value">' + esc(step.modelId) + '</span></div>';
      }
      if (step.provider) {
        html += '<div class="detail-item"><span class="detail-label">Provider</span><span class="detail-value">' + esc(step.provider) + '</span></div>';
      }
      if (step.compactionCount) {
        html += '<div class="detail-item"><span class="detail-label">Compactions</span><span class="detail-value">' + step.compactionCount + '</span></div>';
      }
      if (step.startedAt) {
        const started = new Date(step.startedAt).toLocaleString();
        html += '<div class="detail-item"><span class="detail-label">Started</span><span class="detail-value">' + started + '</span></div>';
      }
      if (step.completedAt) {
        const completed = new Date(step.completedAt).toLocaleString();
        html += '<div class="detail-item"><span class="detail-label">Completed</span><span class="detail-value">' + completed + '</span></div>';
      }
      if (step.sessionId) {
        html += '<div class="detail-item"><span class="detail-label">Session ID</span><span class="detail-value">' + esc(step.sessionId.slice(0, 12)) + '...</span></div>';
      }

      html += '</div>';

      if (step.activity) {
        html += '<div style="margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--line);">';
        html += '<span class="detail-label">Activity</span>';
        html += '<div style="margin-top: 4px; color: var(--text); font-size: 12px;">' + esc(step.activity) + '</div>';
        html += '</div>';
      }

      if (step.result) {
        const resultText = typeof step.result === 'string' ? step.result : JSON.stringify(step.result, null, 2);
        html += '<div style="margin-top: 12px; padding-top: 8px; border-top: 1px solid var(--line);">';
        html += '<span class="detail-label">Result</span>';
        html += '<pre style="margin-top: 4px; background: var(--panel); padding: 8px; border-radius: 4px; font-size: 11px; max-height: 150px; overflow: auto; white-space: pre-wrap;">' + esc(resultText.slice(0, 1000)) + '</pre>';
        html += '</div>';
      }

      return html;
    }

    function renderSessionPanel(run) {
      if (!sessionData) {
        return '<div class="session-panel"><div class="loading">Loading session data...</div></div>';
      }

      let html = '<div class="session-panel">';
      html += '<div style="font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 12px;">Agent Session Details</div>';

      html += '<div class="session-tabs">';
      html += '<div class="session-tab' + (activeSessionTab === 'overview' ? ' active' : '') + '" data-tab="overview">Overview</div>';
      html += '<div class="session-tab' + (activeSessionTab === 'models' ? ' active' : '') + '" data-tab="models">Models</div>';
      html += '<div class="session-tab' + (activeSessionTab === 'tools' ? ' active' : '') + '" data-tab="tools">Tools</div>';
      html += '<div class="session-tab' + (activeSessionTab === 'messages' ? ' active' : '') + '" data-tab="messages">Messages</div>';
      html += '</div>';

      if (activeSessionTab === 'overview') {
        html += renderSessionOverview();
      } else if (activeSessionTab === 'models') {
        html += renderSessionModels();
      } else if (activeSessionTab === 'tools') {
        html += renderSessionTools();
      } else if (activeSessionTab === 'messages') {
        html += renderSessionMessages();
      }

      html += '</div>';

      setTimeout(() => {
        document.querySelectorAll('.session-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            activeSessionTab = tab.dataset.tab;
            renderMainPanel();
          });
        });
      }, 0);

      return html;
    }

    function renderSessionOverview() {
      const s = sessionData;
      let html = '<div class="summary-cards">';

      html += '<div class="summary-card">';
      html += '<div class="summary-card-label">Total Tokens</div>';
      html += '<div class="summary-card-value">' + formatTokens(s.totalTokens.total) + '</div>';
      html += '<div class="summary-card-sub">in: ' + s.totalTokens.input.toLocaleString() + ' · out: ' + s.totalTokens.output.toLocaleString() + '</div>';
      html += '</div>';

      html += '<div class="summary-card">';
      html += '<div class="summary-card-label">Total Cost</div>';
      html += '<div class="summary-card-value">' + formatCost(s.totalCost.total) + '</div>';
      html += '<div class="summary-card-sub">cache: ' + formatCost(s.totalCost.cacheRead + s.totalCost.cacheWrite) + '</div>';
      html += '</div>';

      html += '<div class="summary-card">';
      html += '<div class="summary-card-label">Messages</div>';
      html += '<div class="summary-card-value">' + s.totalMessages + '</div>';
      html += '<div class="summary-card-sub">' + s.assistantMessages + ' assistant · ' + s.userMessages + ' user</div>';
      html += '</div>';

      html += '<div class="summary-card">';
      html += '<div class="summary-card-label">Models Used</div>';
      html += '<div class="summary-card-value">' + s.models.length + '</div>';
      html += '<div class="summary-card-sub">' + s.models.map(m => m.model.split('.').pop()).join(', ') + '</div>';
      html += '</div>';

      html += '<div class="summary-card">';
      html += '<div class="summary-card-label">Tools Used</div>';
      html += '<div class="summary-card-value">' + s.tools.length + '</div>';
      html += '<div class="summary-card-sub">' + s.tools.map(t => t.name).slice(0, 4).join(', ') + (s.tools.length > 4 ? '...' : '') + '</div>';
      html += '</div>';

      if (Object.keys(s.stopReasons).length > 0) {
        html += '<div class="summary-card">';
        html += '<div class="summary-card-label">Stop Reasons</div>';
        html += '<div class="summary-card-value" style="font-size: 14px;">' + Object.entries(s.stopReasons).map(([k, v]) => k + ': ' + v).join(', ') + '</div>';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function renderSessionModels() {
      const s = sessionData;
      if (s.models.length === 0) return '<div class="loading">No model data available</div>';

      let html = '<table class="model-table">';
      html += '<thead><tr><th>Model</th><th>Provider</th><th>Messages</th><th>Tokens</th><th>Cost</th></tr></thead>';
      html += '<tbody>';

      for (const m of s.models) {
        html += '<tr>';
        html += '<td>' + esc(m.model) + '</td>';
        html += '<td>' + esc(m.provider) + '</td>';
        html += '<td>' + m.messageCount + '</td>';
        html += '<td>' + formatTokens(m.tokens.total) + '</td>';
        html += '<td>' + formatCost(m.cost.total) + '</td>';
        html += '</tr>';
      }

      html += '</tbody></table>';
      return html;
    }

    function renderSessionTools() {
      const s = sessionData;
      if (s.tools.length === 0) return '<div class="loading">No tool data available</div>';

      let html = '<table class="tool-table">';
      html += '<thead><tr><th>Tool</th><th>Count</th><th>Last Used</th></tr></thead>';
      html += '<tbody>';

      for (const t of s.tools) {
        html += '<tr>';
        html += '<td>' + esc(t.name) + '</td>';
        html += '<td>' + t.count + '</td>';
        html += '<td>' + (t.lastUsed ? new Date(t.lastUsed).toLocaleTimeString() : '-') + '</td>';
        html += '</tr>';
      }

      html += '</tbody></table>';
      return html;
    }

    function renderSessionMessages() {
      const s = sessionData;
      if (s.messages.length === 0) return '<div class="loading">No messages available</div>';

      let html = '<div class="message-list">';

      for (const msg of s.messages) {
        html += '<div class="message-item">';
        html += '<div class="message-role ' + msg.role + '">' + esc(msg.role) + '</div>';
        if (msg.toolCalls && msg.toolCalls.length > 0) {
          html += '<div style="color: var(--warn); font-size: 11px; margin-bottom: 4px;">Tool calls: ' + msg.toolCalls.map(t => t.name).join(', ') + '</div>';
        }
        if (msg.content) {
          html += '<div class="message-content">' + esc(msg.content) + '</div>';
        }
        html += '<div class="message-meta">';
        if (msg.timestamp) html += '<span>' + new Date(msg.timestamp).toLocaleTimeString() + '</span>';
        if (msg.model) html += '<span>' + esc(msg.model.split('.').pop() || msg.model) + '</span>';
        if (msg.tokens) html += '<span>' + formatTokens(msg.tokens.total) + '</span>';
        if (msg.stopReason) html += '<span>stop: ' + esc(msg.stopReason) + '</span>';
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function nodeIcon(status) {
      switch (status) {
        case 'completed': return '&#10003;';
        case 'failed': return '&#10007;';
        case 'running': return '&#9679;';
        case 'cancelled': return '&#8211;';
        default: return '&#9675;';
      }
    }

    function lineClass(status) {
      if (status === 'completed') return 'active';
      if (status === 'running') return 'running-line';
      return '';
    }

    function lineClassForNext(status) {
      if (status === 'completed') return 'active';
      if (status === 'running') return 'running-line';
      return '';
    }

    function groupByPhase(steps) {
      const groups = [];
      let current = null;
      for (const step of steps) {
        const phaseName = step.phase || '';
        if (!current || current.name !== phaseName) {
          current = { name: phaseName, steps: [] };
          groups.push(current);
        }
        current.steps.push(step);
      }
      return groups;
    }

    function attachNodeClickHandlers() {
      document.querySelectorAll('.tree-node-header').forEach(header => {
        header.addEventListener('click', () => {
          const idx = header.dataset.stepIndex;
          const details = document.getElementById('node-details-' + idx);
          if (details) {
            details.classList.toggle('expanded');
            const expandLabel = header.querySelector('.node-expand');
            if (expandLabel) {
              expandLabel.textContent = details.classList.contains('expanded') ? 'click to collapse' : 'click to expand';
            }
          }
        });
      });
    }

    function renderResult(result) {
      const text = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
      return '<div class="run-result">'
        + '<div class="run-result-label">Result</div>'
        + '<div class="run-result-content">' + esc(text) + '</div>'
        + '</div>';
    }

    function totalDuration(run) {
      const starts = run.steps.filter(s => s.startedAt).map(s => s.startedAt);
      const ends = run.steps.filter(s => s.completedAt).map(s => s.completedAt);
      if (starts.length === 0) return '';
      const first = Math.min(...starts);
      const last = ends.length > 0 ? Math.max(...ends) : Date.now();
      return formatDuration((last - first) / 1000);
    }

    function sequentialDuration(run) {
      const stepsWithDuration = run.steps.filter(s => s.startedAt && s.completedAt);
      if (stepsWithDuration.length === 0) return '';
      const totalMs = stepsWithDuration.reduce((sum, s) => sum + (s.completedAt - s.startedAt), 0);
      return formatDuration(totalMs / 1000);
    }

    function formatDuration(secs) {
      if (secs < 60) return secs.toFixed(0) + 's';
      if (secs < 3600) return (secs / 60).toFixed(1) + 'm';
      return (secs / 3600).toFixed(1) + 'h';
    }

    function formatTokens(count) {
      if (count >= 1_000_000) return (count / 1_000_000).toFixed(1) + 'M';
      if (count >= 1_000) return (count / 1_000).toFixed(1) + 'k';
      return count.toString();
    }

    function formatCost(usd) {
      if (usd >= 1) return '$' + usd.toFixed(2);
      if (usd >= 0.01) return '$' + usd.toFixed(3);
      return (usd * 100).toFixed(2) + '¢';
    }

    function relativeTime(ts) {
      const diff = Date.now() - ts;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return new Date(ts).toLocaleDateString();
    }

    function setMeta(text) {
      document.getElementById('meta').textContent = text;
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
